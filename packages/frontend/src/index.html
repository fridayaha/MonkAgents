<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MonkAgents - 多智能体协作平台</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button id="mobile-menu-btn" class="mobile-menu-btn" title="打开会话列表">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="header-title">
          <img src="./images/logo.svg" alt="MonkAgents" class="logo-icon" id="logo-icon" />
          MonkAgents
        </h1>
        <nav class="nav">
          <button class="nav-item active" data-page="chat">
            <span class="nav-icon" id="nav-icon-chat"></span>
            对话
          </button>
          <button class="nav-item" data-page="tasks">
            <span class="nav-icon" id="nav-icon-tasks"></span>
            任务
          </button>
          <button class="nav-item" data-page="scheduled">
            <span class="nav-icon" id="nav-icon-scheduled"></span>
            定时任务
          </button>
        </nav>
      </div>
      <div class="header-right">
        <button id="mobile-agents-btn" class="mobile-menu-btn" title="打开智能体列表">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="5" r="3"/>
            <circle cx="6" cy="19" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="12" y1="8" x2="6" y2="16"/>
            <line x1="12" y1="8" x2="18" y2="16"/>
          </svg>
        </button>
        <button id="theme-toggle" class="btn btn-icon" title="切换主题">
          <span class="moon-icon" id="theme-moon-icon"></span>
          <span class="sun-icon" id="theme-sun-icon"></span>
        </button>
        <span id="connection-status" class="status-indicator disconnected">已断开</span>
      </div>
    </header>

    <!-- Chat Page -->
    <main id="page-chat" class="page active main-content">
      <!-- Left Sidebar - Sessions -->
      <aside class="sidebar sessions-sidebar">
        <div class="sidebar-header">
          <h2>会话列表</h2>
          <button id="new-session-btn" class="btn btn-primary">
            <span class="btn-icon-sm" id="new-session-icon"></span>
            新建
          </button>
        </div>
        <div id="sessions-list" class="sessions-list">
          <!-- Sessions will be loaded here -->
        </div>
      </aside>

      <!-- Center - Chat Area -->
      <section class="chat-area">
        <div class="chat-header">
          <div class="chat-header-title">
            <h2 id="current-session-title">选择一个会话开始</h2>
            <span id="working-directory" class="working-dir"></span>
          </div>
          <div class="chat-header-actions">
            <button id="debug-btn" class="btn btn-icon" title="调试详情">
              <span id="debug-icon"></span>
            </button>
          </div>
        </div>
        <div id="messages-container" class="messages-container">
          <!-- Messages will be loaded here -->
          <div class="welcome-message">
            <h3>
              <span id="crown-icon" style="display: inline-flex; vertical-align: middle; margin-right: 8px;"></span>
              欢迎使用 MonkAgents
            </h3>
            <p>唐明皇陛下，选择或创建一个会话开始与智能体协作</p>
            <p style="font-size: 0.875rem; color: var(--on-surface-muted); margin-top: 16px;">
              提示：使用 @智能体名称 可以召唤特定智能体<br>
              例如：@孙悟空 写一个函数
            </p>
          </div>
        </div>
        <div class="input-area">
          <div class="input-wrapper">
            <div class="input-container">
              <textarea id="message-input" placeholder="输入你的问题或任务... 使用 @ 召唤智能体" rows="3"></textarea>
              <button id="send-btn" class="btn-send" disabled data-tooltip="请输入你的问题">
                <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
                <svg class="stop-icon" viewBox="0 0 24 24" fill="currentColor">
                  <rect x="6" y="6" width="12" height="12" rx="2"/>
                </svg>
              </button>
              <!-- @ Mention Menu -->
              <div id="mention-menu" class="mention-menu hidden">
                <div class="mention-menu-header">选择智能体</div>
                <div class="mention-menu-list">
                  <!-- Agent items will be populated here -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Right Sidebar - Agents -->
      <aside class="sidebar agents-sidebar">
        <div class="sidebar-header">
          <h2>智能体</h2>
        </div>
        <div id="agents-list" class="agents-list">
          <!-- Agents will be loaded here -->
        </div>
      </aside>
    </main>

    <!-- Tasks Page -->
    <main id="page-tasks" class="page">
      <div class="full-page-content">
        <div class="page-header">
          <h1>
            <span id="tasks-page-icon"></span>
            任务列表
          </h1>
          <div class="page-header-actions">
            <div class="filters">
              <select id="task-status-filter" class="filter-select">
                <option value="">全部状态</option>
                <option value="pending">等待中</option>
                <option value="thinking">思考中</option>
                <option value="executing">执行中</option>
                <option value="completed">已完成</option>
                <option value="failed">失败</option>
              </select>
              <select id="task-session-filter" class="filter-select">
                <option value="">全部会话</option>
              </select>
            </div>
            <button class="btn btn-secondary btn-sm btn-close-page" data-page="chat">
              <span id="close-tasks-icon"></span>
              关闭
            </button>
          </div>
        </div>
        <div id="task-list" class="task-list">
          <!-- Tasks will be loaded here -->
        </div>
      </div>
    </main>

    <!-- Scheduled Tasks Page -->
    <main id="page-scheduled" class="page">
      <div class="full-page-content">
        <div class="page-header">
          <h1>
            <span id="scheduled-page-icon"></span>
            定时任务
          </h1>
          <div class="page-header-actions">
            <button id="new-schedule-btn" class="btn btn-primary">
              <span class="btn-icon-sm" id="new-schedule-icon"></span>
              新建定时任务
            </button>
            <button class="btn btn-secondary btn-sm btn-close-page" data-page="chat">
              <span id="close-scheduled-icon"></span>
              关闭
            </button>
          </div>
        </div>
        <div id="scheduled-list" class="scheduled-list">
          <!-- Scheduled tasks will be loaded here -->
        </div>
      </div>
    </main>

    <!-- Debug Page (shown as modal overlay) -->
    <div id="debug-page" class="modal hidden">
      <div class="modal-content" style="max-width: 800px; width: 90%;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h3>
            <span id="debug-modal-icon" style="display: inline-flex; vertical-align: middle; margin-right: 8px;"></span>
            调试详情
          </h3>
          <button id="close-debug-btn" class="btn btn-icon">
            <span id="close-debug-modal-icon"></span>
          </button>
        </div>
        <div id="debug-content">
          <!-- Debug content will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <!-- New Session Modal -->
  <div id="new-session-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>新建会话</h3>
        <button class="btn btn-icon modal-close-btn" data-modal="new-session-modal">
          <span class="close-modal-icon"></span>
        </button>
      </div>
      <div class="form-group">
        <label for="session-title">会话标题</label>
        <div style="display: flex; gap: 8px; align-items: center;">
          <input type="text" id="session-title" placeholder="点击骰子随机生成标题" style="flex: 1;">
          <button id="random-title-btn" class="btn btn-secondary" type="button" title="随机生成标题">
            <span id="random-icon"></span>
          </button>
        </div>
        <small style="color: var(--on-surface-muted); font-size: 0.75rem;">基于西游记九九八十一难生成</small>
      </div>
      <div class="form-group">
        <label for="working-dir-input">工作目录</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="working-dir-input" placeholder="输入完整路径，如 D:\workspace\project" value="." style="flex: 1;">
          <button id="browse-dir-btn" class="btn btn-secondary" type="button" title="浏览服务器目录">
            <span id="browse-icon"></span>
            浏览
          </button>
        </div>
        <small style="color: var(--on-surface-muted); font-size: 0.75rem;">请输入完整的绝对路径，智能体将在此目录下工作</small>
      </div>
      <div class="modal-actions">
        <button id="cancel-modal-btn" class="btn btn-secondary">取消</button>
        <button id="create-session-btn" class="btn btn-primary">创建</button>
      </div>
    </div>
  </div>

  <!-- New Scheduled Task Modal -->
  <div id="new-schedule-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>新建定时任务</h3>
        <button class="btn btn-icon modal-close-btn" data-modal="new-schedule-modal">
          <span class="close-modal-icon"></span>
        </button>
      </div>
      <div class="form-group">
        <label for="schedule-title">任务标题</label>
        <input type="text" id="schedule-title" placeholder="输入任务标题">
      </div>
      <div class="form-group">
        <label for="schedule-description">任务描述</label>
        <textarea id="schedule-description" placeholder="描述任务内容"></textarea>
      </div>
      <div class="form-group">
        <label for="schedule-time">执行时间</label>
        <input type="datetime-local" id="schedule-time">
      </div>
      <div class="form-group">
        <label for="schedule-repeat">重复方式</label>
        <select id="schedule-repeat" class="filter-select" style="width: 100%;">
          <option value="once">仅一次</option>
          <option value="daily">每天</option>
          <option value="weekly">每周</option>
        </select>
      </div>
      <div class="modal-actions">
        <button id="cancel-schedule-btn" class="btn btn-secondary">取消</button>
        <button id="create-schedule-btn" class="btn btn-primary">创建</button>
      </div>
    </div>
  </div>

  <!-- Custom Dialog Modal -->
  <div id="custom-dialog-modal" class="modal hidden">
    <div class="modal-content modal-dialog">
      <div class="modal-header">
        <h3 id="dialog-title">提示</h3>
      </div>
      <div class="dialog-body">
        <p id="dialog-message"></p>
      </div>
      <div class="modal-actions">
        <button id="dialog-cancel-btn" class="btn btn-secondary hidden">取消</button>
        <button id="dialog-confirm-btn" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  <script type="module" src="./scripts/app.js"></script>

  <!-- Mobile Sidebar Drawers -->
  <div id="drawer-overlay" class="drawer-overlay"></div>
  <aside id="sessions-drawer" class="sidebar-drawer sidebar sessions-sidebar">
    <div class="sidebar-header">
      <h2>会话列表</h2>
      <button id="new-session-btn-drawer" class="btn btn-primary">
        <span class="btn-icon-sm" id="new-session-icon-drawer"></span>
        新建
      </button>
    </div>
    <div id="sessions-list-drawer" class="sessions-list">
      <!-- Sessions will be cloned here -->
    </div>
  </aside>
  <aside id="agents-drawer" class="sidebar-drawer right agents-sidebar">
    <div class="sidebar-header">
      <h2>智能体</h2>
    </div>
    <div id="agents-list-drawer" class="agents-list">
      <!-- Agents will be cloned here -->
    </div>
  </aside>
</body>
</html>
