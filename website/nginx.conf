# HTTP 服务：将所有 HTTP 请求重定向到 HTTPS
server {
    listen 80;
    server_name pow8.cn www.pow8.cn;
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务
server {
    listen 443 ssl http2;
    server_name pow8.cn www.pow8.cn;

    # SSL 证书配置
    ssl_certificate     /home/ubuntu/website/ssl/pow8.cn_bundle.crt;      # 证书文件
    ssl_certificate_key /home/ubuntu/website/ssl/pow8.cn.key;      # 私钥文件

    # 如果证书链是单独的文件，需要合并或指定 ssl_trusted_certificate
    # 若证书文件已包含完整链，则无需额外配置；否则可使用：
    # ssl_trusted_certificate /etc/nginx/ssl/pow8.cn.ca-bundle;

    # 可选：加强 SSL 安全性（推荐）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 网站根目录
    root /home/ubuntu/website/www/pow8.cn/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
}