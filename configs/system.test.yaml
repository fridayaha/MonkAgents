# 测试环境配置
# 此配置用于单元测试和 e2e 测试，与生产环境隔离

database:
  type: mysql
  host: localhost
  port: 3306
  username: root
  password: root
  # 使用独立的测试数据库
  database: monkagents_test

redis:
  host: localhost
  port: 6379
  # 使用独立的 Redis 数据库 (db 1，生产用 db 0)
  db: 1
  keyPrefix: 'monkagents_test:'

server:
  port: 3001
  host: localhost

logging:
  level: debug
  format: pretty